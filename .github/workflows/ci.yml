name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust quality and docs
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check all targets
        run: cargo check --locked --all-targets

      - name: Deny Clippy warnings
        run: cargo clippy --locked --all-targets -- -D warnings

      - name: Run all tests
        run: cargo test --locked --all-targets

      - name: Build documentation with warnings denied
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --locked --no-deps --document-private-items

  contracts:
    name: PSPR and evidence contracts
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.1

      - name: Validate canonical governance and JSON Schemas
        run: cargo test --locked --test governance_contracts

  negative-gates:
    name: "Negative gate: ${{ matrix.gate }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        gate:
          - format
          - clippy
          - test
          - docs
          - pspr
          - evidence
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pinned Rust toolchain
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Prove the deliberately broken fixture is blocked
        run: bash scripts/ci-negative-gate.sh "${{ matrix.gate }}"

  secrets:
    name: Secret scan and negative proof
    runs-on: ubuntu-latest
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Run pinned Gitleaks and prove a generated leak is blocked
        run: bash scripts/ci-gitleaks.sh

  supply-chain:
    name: Dependency, advisory, source, and license policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run cargo-deny policy
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: 1.96.1
          command: check
          arguments: --all-features

      - name: Prove a banned dependency is blocked
        id: negative_deny
        continue-on-error: true
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          rust-version: 1.96.1
          command: --config tests/fixtures/ci-failures/deny-serde.toml check bans
          arguments: --all-features

      - name: Require the negative cargo-deny gate to fail
        if: always()
        run: test "${{ steps.negative_deny.outcome }}" = "failure"

  windows-executable:
    name: Windows native executable
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run overlay lifecycle tests in Windows PowerShell 5.1
        shell: powershell
        run: |
          .\overlay\Test-ContextOverlay.ps1
          .\overlay\Test-OverlayInstaller.ps1

      - name: Verify reproducible x64 release artifact
        shell: powershell
        run: .\ticker\windows\verify-release.ps1 -OutputDirectory "$env:RUNNER_TEMP\1m-context-ticker-dist"

  linux-sol-policy:
    name: Headless Linux Sol policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Check Bash syntax and lint
        run: |
          bash -n scripts/linux/manage-sol-policy
          shellcheck scripts/linux/manage-sol-policy

      - name: Compile the Python manager
        run: python3 -m py_compile scripts/linux/sol_policy_manager.py

      - name: Run Linux policy lifecycle and negative gates
        run: python3 -m unittest discover -s scripts/linux/tests -v

  macos-ticker:
    name: macOS native ticker
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify the frozen macOS contract
        run: python3 ticker/macos/verify-contract.py

      - name: Verify the passive source boundary
        run: python3 ticker/macos/verify-source.py

      - name: Build the native ticker
        run: swift build --package-path ticker/macos --configuration release -Xswiftc -warnings-as-errors

      - name: Run the shared behavior and AppKit tests
        run: swift test --package-path ticker/macos -Xswiftc -warnings-as-errors

      - name: Verify the release packaging source
        run: python3 ticker/macos/verify-package-source.py

      - name: Build and verify the universal DMG
        run: |
          bash ticker/macos/build-release.sh "$RUNNER_TEMP/1m-context-ticker-macos"
          python3 ticker/macos/verify-release.py "$RUNNER_TEMP/1m-context-ticker-macos"

      - name: Upload the universal DMG evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: 1M-Context-Ticker-macOS-universal
          path: |
            ${{ runner.temp }}/1m-context-ticker-macos/1M-Context-Ticker-macOS-universal.dmg
            ${{ runner.temp }}/1m-context-ticker-macos/1M-Context-Ticker-macOS-universal.dmg.sha256
            ${{ runner.temp }}/1m-context-ticker-macos/1M-Context-Ticker-macOS-universal.manifest.json
          if-no-files-found: error
          compression-level: 0
          retention-days: 14
